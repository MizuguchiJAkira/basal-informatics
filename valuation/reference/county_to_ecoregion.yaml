# Texas county → wildlife appraisal ecoregion mapping.
#
# All 254 Texas counties assigned to one of the 8 wildlife appraisal
# regions used by the Texas Comptroller for 1-d-1(w) intensity-of-use
# standards. Counties that span ecoregion boundaries are assigned to
# their dominant region by land-area share; for parcels whose actual
# location matters at boundary precision, the CAD adapter SHOULD pass
# the parcel-resolved ecoregion directly rather than relying on the
# county-level default.
#
# Format: each ecoregion key maps to a flat list of county names
# (lowercase, no "county" suffix). The ``ecoregion_for_county()``
# loader inverts this to a county→ecoregion lookup at import time.
#
# SOURCE: TPWD Comprehensive Wildlife Management Planning Guidelines
# (per-region), cross-referenced against EPA Level III/IV ecoregion
# polygons for boundary-county assignments. Blackland Prairies (a
# distinct EPA region) is folded into Cross Timbers and Prairies for
# the 8-region wildlife appraisal taxonomy. High Plains is folded
# into Rolling Plains the same way.
#
# Coverage: complete (all 254 Texas counties assigned). A county not
# present here is a typo in the input, not a missing entry.

