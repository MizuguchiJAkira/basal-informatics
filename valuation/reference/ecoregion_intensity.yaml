# Texas Comptroller — Manual for the Appraisal of Agricultural Land
# 8 Wildlife Appraisal Regions and their reduced-acreage minimums for
# parcels converting from prior 1-d-1 ag appraisal to 1-d-1(w) wildlife
# appraisal under §23.51(7).
#
# SOURCE: "Texas Comptroller Manual for the Appraisal of Agricultural
# Land" — current edition. Values below mirror the published reduced-
# acreage minimums where the prior parcel had a wildlife management
# plan reducing minimum tract size.
#
# AUDIT NOTE: Reduced-acreage minimums change across editions of the
# Comptroller's manual. Before relying on a specific number for an
# underwriting decision, confirm against the current edition. The
# scoring path uses these as inputs to the
# ``intensity_below_ecoregion_standard`` factor — values out of date
# would inflate that factor's evidence string but never move a parcel
# across a band boundary on their own.
#
# Schema: each ecoregion has a key matching the ``ecoregion`` column on
# parcel_valuation_status, a human-readable name, the standard 1-d-1(w)
# minimum-acreage threshold (without reduced-acreage qualification),
# and the reduced minimum (with prior 1-d-1 history + plan).

edwards_plateau:
  name: "Edwards Plateau"
  standard_min_acres: 12.5
  reduced_min_acres: 12.5
  notes: >
    Hill Country region centered on Kimble, Llano, Kerr, Gillespie, Real,
    Edwards, Mason, Bandera, Blanco, Hays, Sutton counties. Edwards
    Plateau Ranch (TX-KIM-2026-00001) sits here.

post_oak_savannah:
  name: "Post Oak Savannah"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0
  notes: >
    Includes Brazos, Burleson, Robertson, Lee, Bastrop counties. Riverbend
    Farm (TX-BRA-2026-00002) sits here.

cross_timbers_and_prairies:
  name: "Cross Timbers and Prairies"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0

gulf_coast_prairies_and_marshes:
  name: "Gulf Coast Prairies and Marshes"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0

pineywoods:
  name: "Pineywoods"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0

rolling_plains:
  name: "Rolling Plains"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0

south_texas_plains:
  name: "South Texas Plains"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0

trans_pecos:
  name: "Trans-Pecos"
  standard_min_acres: 20.0
  reduced_min_acres: 20.0
