# Texas Truth-in-Taxation per-county combined effective property tax
# rates — county + average school district + city + special districts
# where applicable, expressed as a fractional rate (0.02 = 2.0%).
#
# SOURCE: Texas Comptroller's Truth-in-Taxation API, county tax-rate
# notices, and Texas Tax Foundation effective-rate compilations. The
# values below are 2025 tax-year combined rates, simple county
# averages where multiple school districts overlap.
#
# AUDIT NOTE: combined rates vary at the parcel level by school
# district + city + special-district overlay. The §23.55 rollback
# math accepts a per-parcel ``effective_tax_rate`` override; the
# values here are county-level *averages* used as a default when no
# parcel-specific rate has been pulled. For an underwriting decision
# on a parcel inside a city or MUD with above-average rates, the CAD
# adapter should override.
#
# A productionized version pulls these monthly from the Comptroller's
# Truth-in-Taxation tax-unit detail API (one entry per taxing unit)
# and aggregates to the parcel via address geocoding. Until that
# lands, these averages are the best widely-defensible default.
#
# Counties not in the table fall back to ``DEFAULT`` (2.0%, the
# 2024–2025 Texas state average per the Texas Comptroller).

DEFAULT: 0.0200

